<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schulte Table - Pro Focus Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --surface-hover: #2a2a2a;
            --accent: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* Desktop Optimized Layout */
        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            width: 95vw;
            height: 90vh;
            max-width: 1400px;
            align-items: center;
        }

        /* Sidebar for Controls */
        .sidebar {
            background: var(--surface);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* Main Game Area */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .schulte-grid {
            display: grid;
            gap: 12px; /* Slightly larger gap for desktop */
            width: min(80vh, 80vw); 
            height: min(80vh, 80vw);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .schulte-cell {
            background-color: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.15s ease;
            user-select: none;
            border: 1px solid rgba(255,255,255,0.03);
            /* Dynamic sizing based on grid capacity */
            font-size: clamp(1rem, 5cqi, 3rem);
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .schulte-cell:hover {
            background-color: var(--surface-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .schulte-cell:active {
            transform: scale(0.95) translateY(0);
            background-color: var(--accent);
        }

        .schulte-cell.correct {
            background-color: #10b981;
            color: white;
            border-color: transparent;
        }

        .schulte-cell.wrong {
            background-color: #ef4444;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: -6px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: auto;
                width: 100%;
                overflow-y: auto;
                padding: 1rem;
            }
            .sidebar {
                padding: 1rem;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                gap: 1rem;
            }
            .sidebar-header, .sidebar-stats { display: none; }
            .sidebar-controls { flex: 1; }
            .schulte-grid {
                width: 90vw;
                height: 90vw;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Dashboard Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="text-3xl font-black text-indigo-500">SCHULTE</h1>
                <p class="text-slate-500 text-sm">Peripheral Vision Training</p>
            </div>

            <div class="sidebar-controls space-y-6">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-semibold text-slate-400">GRID SIZE</span>
                        <span id="sizeDisplay" class="bg-indigo-500/10 text-indigo-400 px-2 py-1 rounded text-xs font-bold">5x5</span>
                    </div>
                    <input type="range" id="gridSlider" min="3" max="8" value="5" class="cursor-pointer">
                    <div class="flex justify-between text-[10px] text-slate-600 mt-2 font-bold">
                        <span>3x3</span>
                        <span>8x8</span>
                    </div>
                </div>

                <button onclick="initGame()" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl transition-all flex items-center justify-center gap-2 font-bold border border-white/5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    RESET BOARD
                </button>
            </div>

            <div class="sidebar-stats mt-auto space-y-4">
                <div class="bg-black/20 p-4 rounded-2xl">
                    <span class="text-[10px] text-slate-500 block mb-1 uppercase tracking-widest font-bold">Target</span>
                    <span id="targetDisplay" class="text-4xl font-mono text-white">1</span>
                </div>
                <div class="bg-black/20 p-4 rounded-2xl">
                    <span class="text-[10px] text-slate-500 block mb-1 uppercase tracking-widest font-bold">Stopwatch</span>
                    <span id="timerDisplay" class="text-4xl font-mono text-indigo-400">00.0</span>
                </div>
            </div>
        </aside>

        <!-- Main Game Area -->
        <main class="game-area">
            <div id="gridContainer" class="schulte-grid"></div>
            <div id="feedback" class="mt-6 h-6 text-indigo-400/60 font-medium tracking-wide"></div>
        </main>
    </div>

    <!-- Modal with dark theme for reduced eye strain -->
    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 hidden p-4">
        <div class="bg-[#1e1e1e] p-10 rounded-3xl max-w-sm w-full text-center shadow-2xl border border-white/10">
            <div class="w-20 h-20 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-3xl font-black mb-2 text-white">Great Focus!</h2>
            <p id="finalTime" class="text-slate-400 text-lg mb-8 font-mono">Time: 00.0s</p>
            <button id="restartBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black transition-all shadow-lg">
                TRY AGAIN
            </button>
        </div>
    </div>

    <script>
        let gridSize = 5;
        let nextNumber = 1;
        let timerInterval = null;
        let startTime = null;
        let isRunning = false;

        const gridContainer = document.getElementById('gridContainer');
        const gridSlider = document.getElementById('gridSlider');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const targetDisplay = document.getElementById('targetDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const feedback = document.getElementById('feedback');
        const modal = document.getElementById('modal');
        const restartBtn = document.getElementById('restartBtn');
        const finalTimeDisplay = document.getElementById('finalTime');

        function initGame() {
            clearInterval(timerInterval);
            isRunning = false;
            nextNumber = 1;
            timerDisplay.innerText = "00.0";
            targetDisplay.innerText = "1";
            feedback.innerText = "Focus on the center. Start with 1.";
            
            const totalCells = gridSize * gridSize;
            const numbers = Array.from({length: totalCells}, (_, i) => i + 1);
            shuffleArray(numbers);

            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            gridContainer.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;
            
            numbers.forEach(num => {
                const cell = document.createElement('div');
                cell.className = `schulte-cell`;
                cell.innerText = num;
                cell.onclick = () => handleCellClick(num, cell);
                gridContainer.appendChild(cell);
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timerDisplay.innerText = elapsed.toFixed(1);
            }, 100);
        }

        function handleCellClick(num, element) {
            if (num === nextNumber) {
                if (!isRunning) {
                    isRunning = true;
                    startTimer();
                }

                element.classList.add('correct');
                
                if (nextNumber === gridSize * gridSize) {
                    finishGame();
                } else {
                    nextNumber++;
                    targetDisplay.innerText = nextNumber;
                }
                feedback.innerText = "";
                setTimeout(() => element.classList.remove('correct'), 200);
            } else {
                element.classList.add('wrong');
                setTimeout(() => element.classList.remove('wrong'), 300);
                feedback.innerText = "Next number is " + nextNumber;
            }
        }

        function finishGame() {
            clearInterval(timerInterval);
            const timeTaken = timerDisplay.innerText;
            finalTimeDisplay.innerText = `You finished in ${timeTaken} seconds`;
            modal.classList.remove('hidden');
        }

        gridSlider.oninput = (e) => {
            gridSize = parseInt(e.target.value);
            sizeDisplay.innerText = `${gridSize}x${gridSize}`;
            initGame();
        };

        restartBtn.onclick = () => {
            modal.classList.add('hidden');
            initGame();
        };

        window.onload = initGame;
    </script>
</body>
</html>
